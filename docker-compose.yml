services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: veritas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d veritas"]
      interval: 10s
      timeout: 5s
      retries: 5

  whisper-worker:
    build:
      context: .
      dockerfile: infra/faster-whisper-worker/Dockerfile
    environment:
      WHISPER_MODEL: tiny
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 20s
      timeout: 10s
      retries: 5

  ingest:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    command: ["node", "--import", "tsx", "services/ingest/src/index.ts"]
    environment:
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      WHISPER_WORKER_URL: ${WHISPER_WORKER_URL:-http://whisper-worker:8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TRANSCRIPTION_CONTEXT_SEGMENTS: ${TRANSCRIPTION_CONTEXT_SEGMENTS:-3}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  reasoning:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    command: ["node", "--import", "tsx", "services/reasoning/src/index.ts"]
    environment:
      PORT: 4002
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      INTERVENTION_CONFIDENCE_THRESHOLD: ${INTERVENTION_CONFIDENCE_THRESHOLD:-0.75}
    depends_on:
      redis:
        condition: service_healthy

  data:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    command: ["node", "--import", "tsx", "services/data/src/index.ts"]
    environment:
      PORT: 4004
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://postgres:postgres@postgres:5432/veritas}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "4004:4004"

  identity:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    command: ["node", "--import", "tsx", "services/identity/src/index.ts"]
    environment:
      PORT: 4005
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://postgres:postgres@postgres:5432/veritas}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4005:4005"

volumes:
  postgres-data:
