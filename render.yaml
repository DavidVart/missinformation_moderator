# Render Blueprint — Real Talk Backend Services
# https://render.com/docs/blueprint-spec
#
# Deploy: connect your GitHub repo in Render Dashboard, it will detect this file.
#
# IMPORTANT: After deploying, create an Environment Group called "real-talk-env"
# in Render Dashboard (Environment → Env Groups) with your secrets (OPENAI_API_KEY,
# TAVILY_API_KEY, REDIS_URL, POSTGRES_URL, etc.), then link it to all services.
# The blueprint only defines non-secret env vars inline.

services:
  # ── Ingest (Socket.io + Transcription — needs WebSocket support) ──
  - type: web
    name: real-talk-ingestion
    runtime: node
    region: ohio
    plan: starter
    buildCommand: npm install && npm run build -w @project-veritas/contracts && npm run build -w @project-veritas/config && npm run build -w @project-veritas/observability && npm run build -w @project-veritas/ingest
    startCommand: node services/ingest/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: WHISPER_MODEL
        value: base
      - key: SESSION_TTL_SECONDS
        value: "3600"
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: WHISPER_WORKER_URL
        sync: false
      - key: TRANSCRIPTION_CONTEXT_SEGMENTS
        value: "3"

  # ── Reasoning (Claim detection + verification + notification) ──
  - type: web
    name: real-talk-reasoning
    runtime: node
    region: ohio
    plan: starter
    buildCommand: npm install && npm run build -w @project-veritas/contracts && npm run build -w @project-veritas/config && npm run build -w @project-veritas/observability && npm run build -w @project-veritas/reasoning
    startCommand: node services/reasoning/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4002"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TAVILY_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: INTERVENTION_CONFIDENCE_THRESHOLD
        value: "0.75"
      - key: CORS_ORIGIN
        sync: false

  # ── Data (History + Analytics — REST API + Postgres persistence) ──
  - type: web
    name: real-talk-data
    runtime: node
    region: ohio
    plan: starter
    buildCommand: npm install && npm run build -w @project-veritas/contracts && npm run build -w @project-veritas/config && npm run build -w @project-veritas/observability && npm run build -w @project-veritas/data
    startCommand: node --dns-result-order=ipv4first services/data/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4004"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: REDIS_URL
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Identity (Auth API) ──
  - type: web
    name: real-talk-identity
    runtime: node
    region: ohio
    plan: starter
    buildCommand: npm install && npm run build -w @project-veritas/contracts && npm run build -w @project-veritas/config && npm run build -w @project-veritas/observability && npm run build -w @project-veritas/identity
    startCommand: node --dns-result-order=ipv4first services/identity/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4005"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: REDIS_URL
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
