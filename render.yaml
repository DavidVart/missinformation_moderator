# Render Blueprint — Real Talk Backend Services
# https://render.com/docs/blueprint-spec
#
# Deploy: connect your GitHub repo in Render Dashboard, it will detect this file.
#
# IMPORTANT: After deploying, create an Environment Group called "real-talk-env"
# in Render Dashboard (Environment → Env Groups) with your secrets (OPENAI_API_KEY,
# TAVILY_API_KEY, REDIS_URL, POSTGRES_URL, etc.), then link it to all services.
# The blueprint only defines non-secret env vars inline.

services:
  # ── Ingestion (Socket.io — needs WebSocket support) ──
  - type: web
    name: real-talk-ingestion
    runtime: node
    region: ohio
    plan: starter
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build -w @project-veritas/contracts && npm run build -w @project-veritas/config && npm run build -w @project-veritas/observability && npm run build -w @project-veritas/ingestion
    startCommand: node services/ingestion/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: WHISPER_MODEL
        value: base
      - key: INTERVENTION_CONFIDENCE_THRESHOLD
        value: "0.75"
      - key: SESSION_TTL_SECONDS
        value: "3600"
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── History (REST API + Postgres persistence) ──
  - type: web
    name: real-talk-history
    runtime: node
    region: ohio
    plan: starter
    buildCommand: npm install && npm run build -w @project-veritas/contracts && npm run build -w @project-veritas/config && npm run build -w @project-veritas/observability && npm run build -w @project-veritas/history
